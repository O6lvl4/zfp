name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Zig
        id: cache-zig
        uses: actions/cache@v4
        with:
          path: ~/.local/zig
          key: zig-0.15.2-linux-x86_64

      - name: Download Zig
        if: steps.cache-zig.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/zig
          curl -fsSL https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz \
            | tar -xJ --strip-components=1 -C ~/.local/zig

      - name: Add Zig to PATH
        run: echo "$HOME/.local/zig" >> $GITHUB_PATH

      - run: zig build test --summary all
